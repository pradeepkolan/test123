name: Deploy Application
permissions:
  contents: write   # allow pushing branches/tags
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build project
        run: echo "Building project..."

      - name: Run tests
        run: echo "Running tests..."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://your-app.example.com
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy application
        run: echo "Deploying to production..."

  release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write   # allow pushing branches/tags
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create release branch and tag
        run: |
          DATE=$(date +'%Y%m%d')                # e.g., 20260305
          BRANCH="release-$DATE"
          COMMIT_SHA=${GITHUB_SHA}              # commit that triggered the workflow
          TAG="release-$DATE-$COMMIT_SHA"

          # Create branch from the commit
          git checkout -b $BRANCH $COMMIT_SHA

          # Push branch
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} $BRANCH --force

          # Create tag pointing to that commit
          git tag $TAG $COMMIT_SHA
          git pull
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} $TAG --force
