name: Deploy Application
permissions:
  contents: write   # allow pushing branches/tags
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build project
        run: echo "Building project..."

      - name: Run tests
        run: echo "Running tests..."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://your-app.example.com
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy application
        run: echo "Deploying to production..."

  release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write   # allow pushing branches/tags
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create release branch and tag
        run: |
         DATE=$(date +'%Y%m%d')
         BRANCH="release-$DATE"
         COMMIT_SHA=${GITHUB_SHA}
         TAG="release-$DATE-${COMMIT_SHA:0:7}"   # short SHA for readability

         git config user.name "github-actions"
         git config user.email "github-actions@github.com"

         # Reset branch to the commit
         git checkout -B $BRANCH $COMMIT_SHA

         # Force push branch
         git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} $BRANCH --force

         # Create or update tag pointing to commit
         git tag -f $TAG $COMMIT_SHA
         git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} $TAG --force
